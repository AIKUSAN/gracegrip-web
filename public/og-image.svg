<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Body background: linear-gradient(140deg, #f6f1e9, #fff8ed 40%, #eadcc8) -->
    <linearGradient id="bg-base" x1="17.9%" y1="11.7%" x2="82.1%" y2="88.3%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f6f1e9"/>
      <stop offset="40%"  stop-color="#fff8ed"/>
      <stop offset="100%" stop-color="#eadcc8"/>
    </linearGradient>

    <!-- Amber radial: circle at 10% 15%, rgba(178,109,47,0.18), transparent 35% -->
    <radialGradient id="grad-amber" cx="120" cy="95" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#b26d2f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#b26d2f" stop-opacity="0"/>
    </radialGradient>

    <!-- Teal radial: circle at 90% 0%, rgba(48,95,79,0.2), transparent 32% -->
    <radialGradient id="grad-teal" cx="1080" cy="0" r="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#305f4f" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#305f4f" stop-opacity="0"/>
    </radialGradient>

    <!-- Card drop shadow -->
    <filter id="card-shadow" x="-6%" y="-8%" width="112%" height="128%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#1d2b28" flood-opacity="0.09"/>
    </filter>
  </defs>

  <!-- ═══════════ BACKGROUND ═══════════ -->
  <rect width="1200" height="630" fill="url(#bg-base)"/>
  <rect width="1200" height="630" fill="url(#grad-amber)"/>
  <rect width="1200" height="630" fill="url(#grad-teal)"/>

  <!-- ═══════════ MAIN CARD ═══════════ -->
  <rect x="100" y="28" width="1000" height="382" rx="18"
        fill="#ffffff" fill-opacity="0.84" filter="url(#card-shadow)"/>

  <!-- Logo mark — injected by scripts/generate-og-image.mjs
       Centered at (600, 100): translate(600,100) scale(0.08528) translate(-1408,-652.5) -->
  <!-- __LOGO_INJECT__ -->

  <!-- Wordmark -->
  <text
    x="600" y="198"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="66" font-weight="700"
    fill="#1d2b28"
    text-anchor="middle"
    letter-spacing="8"
  >GRACEGRIP</text>

  <!-- Subtitle -->
  <text
    x="600" y="232"
    font-family="Arial, Helvetica, sans-serif"
    font-size="17" font-weight="400"
    fill="#305f4f" fill-opacity="0.85"
    text-anchor="middle"
  >A private, grace-first companion for the hard days.</text>

  <!-- Divider -->
  <rect x="532" y="250" width="136" height="2" rx="1" fill="#305f4f" fill-opacity="0.2"/>

  <!-- Main headline -->
  <text
    x="600" y="294"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="40" font-weight="700"
    fill="#1d2b28"
    text-anchor="middle"
  >You don&#x2019;t have to fight alone</text>

  <!-- CTA Button -->
  <rect x="425" y="316" width="350" height="52" rx="26" fill="#305f4f"/>
  <text
    x="600" y="349"
    font-family="Arial, Helvetica, sans-serif"
    font-size="18" font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
  >Begin Your Journey</text>

  <!-- ═══════════ FEATURE CARDS ═══════════ -->

  <!-- Card 1: Privacy-First -->
  <rect x="90" y="432" width="326" height="170" rx="14"
        fill="#ffffff" fill-opacity="0.84" filter="url(#card-shadow)"/>
  <text x="253" y="469"
        font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600"
        fill="#305f4f" text-anchor="middle">Privacy-First</text>
  <text x="253" y="492"
        font-family="Arial, Helvetica, sans-serif" font-size="13"
        fill="#305f4f" fill-opacity="0.65" text-anchor="middle">Your data stays on this device.</text>
  <text x="253" y="509"
        font-family="Arial, Helvetica, sans-serif" font-size="13"
        fill="#305f4f" fill-opacity="0.65" text-anchor="middle">No account, no tracking.</text>

  <!-- Card 2: Scripture-Powered -->
  <rect x="436" y="432" width="326" height="170" rx="14"
        fill="#ffffff" fill-opacity="0.84" filter="url(#card-shadow)"/>
  <text x="599" y="469"
        font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600"
        fill="#305f4f" text-anchor="middle">Scripture-Powered</text>
  <text x="599" y="492"
        font-family="Arial, Helvetica, sans-serif" font-size="13"
        fill="#305f4f" fill-opacity="0.65" text-anchor="middle">Verses and devotionals to</text>
  <text x="599" y="509"
        font-family="Arial, Helvetica, sans-serif" font-size="13"
        fill="#305f4f" fill-opacity="0.65" text-anchor="middle">steady your thoughts.</text>

  <!-- Card 3: Practical Tools -->
  <rect x="782" y="432" width="326" height="170" rx="14"
        fill="#ffffff" fill-opacity="0.84" filter="url(#card-shadow)"/>
  <text x="945" y="469"
        font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600"
        fill="#305f4f" text-anchor="middle">Practical Tools</text>
  <text x="945" y="492"
        font-family="Arial, Helvetica, sans-serif" font-size="13"
        fill="#305f4f" fill-opacity="0.65" text-anchor="middle">Breathing, grounding and</text>
  <text x="945" y="509"
        font-family="Arial, Helvetica, sans-serif" font-size="13"
        fill="#305f4f" fill-opacity="0.65" text-anchor="middle">emergency actions.</text>
</svg>
