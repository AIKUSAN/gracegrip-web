<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Strength category artwork</title>
  <desc id="desc">Mountain ridges and sunrise glow representing endurance and courage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f3640"/>
      <stop offset="0.55" stop-color="#2a5f6d"/>
      <stop offset="1" stop-color="#f1a652"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd082" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffd082" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <polygon points="120,560 360,220 580,560" fill="#284650" fill-opacity="0.8"/>
  <polygon points="330,560 615,170 900,560" fill="#1d363e" fill-opacity="0.85"/>
  <polygon points="700,560 965,250 1200,560" fill="#172d35" fill-opacity="0.88"/>
  <circle cx="720" cy="110" r="72" fill="url(#sun)"/>
</svg>
